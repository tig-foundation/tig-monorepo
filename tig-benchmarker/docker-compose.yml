services:
  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres  
      - POSTGRES_DB=benchmarker
    networks:
      - tig-benchmarker

  master:
    build:
      context: ./master
      dockerfile: Dockerfile
    networks:
      - tig-benchmarker
    ports:
      - 5115:5115
    depends_on:
      - db

  ui:
    build: 
      context: ./ui
      dockerfile: Dockerfile
    networks:
      - tig-benchmarker
    ports:
      - 8083:80
    depends_on:
      - master

networks:
  tig-benchmarker: